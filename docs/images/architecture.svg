<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#29B5E8"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#E65100"/>
    </linearGradient>
    <marker id="arrow" markerWidth="6" markerHeight="4.5" refX="6" refY="2.25" orient="auto">
      <polygon points="0 0, 6 2.25, 0 4.5" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <text x="450" y="28" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a1a2e">Clublabs Intelligence Agent Architecture</text>
  
  <!-- Agent Layer -->
  <rect x="300" y="45" width="300" height="55" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="78" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Clublabs Intelligence Agent</text>
  
  <path d="M350 100 L200 130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M450 100 L450 130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M550 100 L700 130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Tools Layer -->
  <rect x="60" y="135" width="200" height="70" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="160" y="162" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Cortex Analyst</text>
  <text x="160" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="white">3 Semantic Views</text>
  <text x="160" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="white">NL to SQL</text>
  
  <rect x="350" y="135" width="200" height="70" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="450" y="162" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Cortex Search</text>
  <text x="450" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="white">2 Search Services</text>
  <text x="450" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="white">Transcript Retrieval</text>
  
  <rect x="640" y="135" width="200" height="70" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="740" y="162" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">SQL Functions</text>
  <text x="740" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="white">9 Agent Tools</text>
  <text x="740" y="194" text-anchor="middle" font-family="Arial" font-size="9" fill="white">KPIs, Anomalies, Funnel</text>
  
  <path d="M160 205 L160 225" stroke="#666" stroke-width="2"/>
  <path d="M450 205 L450 225" stroke="#666" stroke-width="2"/>
  <path d="M740 205 L740 225" stroke="#666" stroke-width="2"/>
  
  <!-- Database Layer Box (outer container) -->
  <rect x="45" y="230" width="810" height="145" rx="8" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-dasharray="0"/>
  
  <!-- Database Header -->
  <rect x="50" y="235" width="800" height="25" rx="4" fill="#1a1a2e"/>
  <text x="450" y="253" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">CLUBLABS_INTELLIGENCE Database</text>
  
  <!-- Schema Boxes Row 1 -->
  <rect x="55" y="270" width="130" height="90" rx="5" fill="#E3F2FD" stroke="#1976D2" filter="url(#shadow)"/>
  <text x="120" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976D2">SEMANTIC</text>
  <text x="120" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CHATBOT_CONV_SV</text>
  <text x="120" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">DAILY_KPIS_SV</text>
  <text x="120" y="334" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MEMBER_SV</text>
  <text x="120" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">FUNNEL_SV</text>
  
  <rect x="195" y="270" width="130" height="90" rx="5" fill="#E8F5E9" stroke="#388E3C" filter="url(#shadow)"/>
  <text x="260" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#388E3C">SEARCH</text>
  <text x="260" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CONVERSATION</text>
  <text x="260" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">RESOLUTION</text>
  
  <rect x="335" y="270" width="130" height="90" rx="5" fill="#F3E5F5" stroke="#7B1FA2" filter="url(#shadow)"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#7B1FA2">MODELS</text>
  <text x="400" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">GET_KPIS</text>
  <text x="400" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">DETECT_ANOMALIES</text>
  <text x="400" y="334" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">FUNNEL_ANALYSIS</text>
  <text x="400" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">+ 6 more</text>
  
  <rect x="475" y="270" width="130" height="90" rx="5" fill="#FFF3E0" stroke="#F57C00" filter="url(#shadow)"/>
  <text x="540" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#F57C00">ANALYTICS</text>
  <text x="540" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">DIM_* (6 tables)</text>
  <text x="540" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">FACT_* (6 tables)</text>
  <text x="540" y="334" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">V_* (10 views)</text>
  <text x="540" y="348" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">19-Step Funnel</text>
  
  <rect x="615" y="270" width="130" height="90" rx="5" fill="#ECEFF1" stroke="#546E7A" filter="url(#shadow)"/>
  <text x="680" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#546E7A">RAW</text>
  <text x="680" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CHATBOT_LOGS</text>
  <text x="680" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">TRANSCRIPTS</text>
  <text x="680" y="334" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">+ Streams</text>
  
  <rect x="755" y="270" width="90" height="90" rx="5" fill="#E0F2F1" stroke="#00897B" filter="url(#shadow)"/>
  <text x="800" y="290" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#00897B">STAGING</text>
  <text x="800" y="306" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Tasks</text>
  <text x="800" y="320" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">MERGE</text>
  <text x="800" y="334" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Transform</text>
  
  <!-- Stream/Task Flow Label (centered) -->
  <rect x="360" y="420" width="180" height="48" rx="5" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="433" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#00897B">Stream + Task (5 min)</text>
  <text x="450" y="446" text-anchor="middle" font-family="Arial" font-size="8" fill="#00897B">(or Dynamic Tables)</text>
  <text x="450" y="459" text-anchor="middle" font-family="Arial" font-size="8" fill="#00897B">CDC Transformation</text>
  
  <!-- Arrow from Ingestion to Stream+Task -->
  <path d="M450 505 L450 468" stroke="#00897B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  
  <!-- Arrow from Stream+Task to Database Layer -->
  <path d="M450 420 L450 380" stroke="#00897B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  
  <!-- Snowpipe Section -->
  <rect x="50" y="505" width="800" height="80" rx="8" fill="#FFF8E1" stroke="#FFB300" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="527" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FF8F00">Ingestion Layer</text>
  
  <rect x="70" y="540" width="160" height="35" rx="5" fill="white" stroke="#FFB300"/>
  <text x="150" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FF8F00">Snowpipe US-East-1</text>
  <text x="150" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Auto-Ingest</text>
  
  <rect x="250" y="540" width="160" height="35" rx="5" fill="white" stroke="#FFB300"/>
  <text x="330" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FF8F00">Snowpipe US-West-2</text>
  <text x="330" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Auto-Ingest</text>
  
  <rect x="430" y="540" width="200" height="35" rx="5" fill="white" stroke="#FFB300"/>
  <text x="530" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FF8F00">Storage Integration</text>
  <text x="530" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">AWS S3 External Stage</text>
  
  <rect x="650" y="540" width="180" height="35" rx="5" fill="white" stroke="#FFB300"/>
  <text x="740" y="560" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#FF8F00">Custom Flows</text>
  <text x="740" y="571" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">MongoDB, AAA Systems</text>
  
  <!-- Source Systems -->
  <rect x="50" y="610" width="350" height="55" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="635" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">ERS Chatbot + OLB App</text>
  <text x="225" y="653" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">AWS Kinesis to S3 (compressed JSON)</text>
  
  <rect x="420" y="610" width="200" height="55" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="635" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">MongoDB</text>
  <text x="520" y="653" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">IVR Data, Transcripts</text>
  
  <rect x="640" y="610" width="200" height="55" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="635" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#C62828">AAA Internal</text>
  <text x="740" y="653" text-anchor="middle" font-family="Arial" font-size="9" fill="#C62828">Member Data, Systems</text>
  
  <!-- Arrows from sources to Snowpipe -->
  <path d="M225 610 L225 585" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M520 610 L520 585" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M740 610 L740 585" stroke="#C62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  
  <!-- Legend -->
  <rect x="50" y="685" width="800" height="35" rx="4" fill="#f5f5f5" stroke="#ddd" filter="url(#shadow)"/>
  <circle cx="80" cy="702" r="7" fill="url(#blueGrad)"/>
  <text x="95" y="706" font-family="Arial" font-size="9" fill="#333">Agent</text>
  <circle cx="160" cy="702" r="7" fill="url(#greenGrad)"/>
  <text x="175" y="706" font-family="Arial" font-size="9" fill="#333">Tools</text>
  <rect x="240" y="695" width="14" height="14" rx="2" fill="#FFF3E0" stroke="#F57C00"/>
  <text x="262" y="706" font-family="Arial" font-size="9" fill="#333">Schemas</text>
  <rect x="330" y="695" width="14" height="14" rx="2" fill="#FFF8E1" stroke="#FFB300"/>
  <text x="352" y="706" font-family="Arial" font-size="9" fill="#333">Ingestion</text>
  <rect x="420" y="695" width="14" height="14" rx="2" fill="#E0F2F1" stroke="#00897B"/>
  <text x="442" y="706" font-family="Arial" font-size="9" fill="#333">CDC</text>
  <rect x="490" y="695" width="14" height="14" rx="2" fill="#FFEBEE" stroke="#C62828"/>
  <text x="512" y="706" font-family="Arial" font-size="9" fill="#333">External Sources</text>
</svg>