    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1a1a2e">Clublabs Intelligence Agent Architecture</text>
  
  <rect x="250" y="50" width="300" height="60" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Clublabs Intelligence Agent</text>
  
  <path d="M300 110 L180 140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M400 110 L400 140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 110 L620 140" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="60" y="145" width="200" height="75" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
