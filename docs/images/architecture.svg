  <text x="522" y="345" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">FACT_* (4 tables)</text>
  <text x="522" y="360" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">V_* (7 views)</text>
  
  <rect x="595" y="290" width="125" height="95" rx="5" fill="#ECEFF1" stroke="#546E7A" filter="url(#shadow)"/>
  <text x="657" y="310" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#546E7A">RAW</text>
  <text x="657" y="330" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">CHATBOT_LOGS</text>
