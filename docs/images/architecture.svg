  <text x="160" y="206" text-anchor="middle" font-family="Arial" font-size="9" fill="white">NL to SQL</text>
  
  <rect x="300" y="145" width="200" height="75" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
