  <circle cx="80" cy="507" r="7" fill="url(#blueGrad)"/>
  <text x="95" y="511" font-family="Arial" font-size="9" fill="#333">Agent</text>
  <circle cx="170" cy="507" r="7" fill="url(#greenGrad)"/>
  <text x="185" y="511" font-family="Arial" font-size="9" fill="#333">Tools</text>
  <rect x="260" y="500" width="14" height="14" rx="2" fill="#FFF3E0" stroke="#F57C00"/>
