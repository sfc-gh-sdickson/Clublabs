  <rect x="50" y="75" width="180" height="55" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="95" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#1976D2">Step 1</text>
  <text x="140" y="110" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">01_database_schema.sql</text>
