  <text x="800" y="215" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">07_ml_functions.sql</text>
  <text x="800" y="227" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">9 Agent Tool Functions</text>
  
