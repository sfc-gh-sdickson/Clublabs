  <text x="510" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">CHATBOT_LOGS_STREAM, TRANSCRIPTS_STREAM</text>
  
  <line x1="650" y1="312" x2="690" y2="312" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  
  <rect x="690" y="285" width="200" height="55" rx="6" fill="#E0F2F1" stroke="#00897B" stroke-width="2" filter="url(#shadow)"/>
