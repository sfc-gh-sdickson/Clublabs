  <text x="475" y="515" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#D84315">notebooks/ml_financial_models.ipynb</text>
  <text x="475" y="530" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">Train and Register ML Models to Snowflake Registry</text>
