  <text x="360" y="110" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">02_create_tables.sql</text>
  <text x="360" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">Dimension + Fact Tables</text>
  
  <line x1="450" y1="102" x2="490" y2="102" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  
  <rect x="490" y="75" width="180" height="55" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
