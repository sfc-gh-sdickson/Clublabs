  <text x="475" y="647" text-anchor="middle" font-family="Arial" font-size="7" fill="white">3 Analyst + 2 Search + 9 Functions</text>
  
  <line x1="475" y1="655" x2="475" y2="685" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Verification -->
  <rect x="350" y="690" width="250" height="45" rx="6" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <text x="475" y="710" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Verification</text>
  <text x="475" y="727" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Test with docs/questions.md (60+ queries)</text>
  
  <!-- File Count Summary -->
  <rect x="50" y="760" width="850" height="60" rx="6" fill="#f5f5f5" stroke="#ddd" filter="url(#shadow)"/>
  <text x="475" y="783" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Deployment Summary</text>
  <text x="475" y="805" text-anchor="middle" font-family="Arial" font-size="10" fill="#666">11 SQL files + 1 notebook | 6 dimensions, 6 facts, 10 views, 4 semantic views, 2 search services, 9 functions, 3 ML models</text>
